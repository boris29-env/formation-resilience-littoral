<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Trombinoscope IGEDD (live)</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root {
    --group-I: #4FB3B3;
    --group-II: #F0A044;
    --group-III: #F0DA4F;
    --group-other: #C9C9C9;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 16px;
    color: #222;
    background: #fff;
  }
  #status {
    padding: 24px;
    text-align: center;
    color: #666;
  }
  #toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  #toolbar h1 {
    font-size: 18px;
    margin: 0;
    color: #1F5C5C;
  }
  #toolbar .meta {
    font-size: 12px;
    color: #777;
  }
  #toolbar button {
    background: #1F5C5C;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  #toolbar button:hover { background: #164545; }

  section.section-block {
    margin-bottom: 24px;
  }
  section.section-block h2 {
    font-size: 15px;
    color: #1F5C5C;
    border-bottom: 2px solid #1F5C5C;
    padding-bottom: 4px;
    margin: 0 0 10px 0;
  }
  .promo-block {
    margin: 14px 0 18px 0;
  }
  .promo-block h3 {
    font-size: 12.5px;
    font-weight: bold;
    color: #4A7A7A;
    border-bottom: 1px solid #B9D3D3;
    padding-bottom: 3px;
    margin: 0 0 8px 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .card {
    border: 1px solid #D9D9D9;
    border-radius: 4px;
    padding: 8px;
    break-inside: avoid;
    page-break-inside: avoid;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .card .photo {
    width: 130px;
    height: 86px;
    object-fit: cover;
    border-radius: 2px;
    background: #EEEEEE;
  }
  .card .photo-placeholder {
    width: 130px;
    height: 86px;
    border-radius: 2px;
    background: #EEEEEE;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 10px;
    font-style: italic;
  }
  .card .name {
    font-weight: bold;
    font-size: 13px;
    margin-top: 6px;
  }
  .card .age {
    font-weight: normal;
    color: #555;
    font-size: 11.5px;
  }
  .card .badge {
    font-size: 11px;
    font-weight: bold;
    padding: 2px 0;
    width: 100%;
    margin-top: 4px;
    border-radius: 2px;
  }
  .card .promo {
    font-size: 10.5px;
    font-style: italic;
    color: #555;
    margin-top: 4px;
  }
  .card .corpsgrade {
    font-size: 10.5px;
    color: #555;
    margin-top: 2px;
  }
  .card .comp {
    font-size: 10.5px;
    margin-top: 4px;
    text-align: left;
  }
  .card .incomplet {
    font-size: 9px;
    color: #B00000;
    font-style: italic;
    margin-top: 4px;
  }

  @media print {
    #toolbar button, #toolbar .hint { display: none; }
    body { padding: 0; }
    section.section-block { page-break-before: always; }
    section.section-block:first-of-type { page-break-before: auto; }
  }
</style>
</head>
<body>

<div id="status">En attente des données Grist…</div>

<div id="app" style="display:none">
  <div id="toolbar">
    <div>
      <h1>Trombinoscope IGEDD — Inspecteurs</h1>
      <div class="meta" id="meta"></div>
    </div>
    <div>
      <span class="hint" style="font-size:11px;color:#999;margin-right:10px;">Ctrl/Cmd+P pour imprimer en PDF</span>
      <button onclick="window.print()">Imprimer / PDF</button>
    </div>
  </div>
  <div id="sections"></div>
</div>

<script>
const MOIS_FR = {
  '01':'janvier','02':'février','03':'mars','04':'avril','05':'mai','06':'juin',
  '07':'juillet','08':'août','09':'septembre','10':'octobre','11':'novembre','12':'décembre'
};

const SECTION_NAMES = {
  'MRR': 'Milieux, ressources et risques (MRR)',
  'HACS': "Habitat, aménagement et cohésion sociale (HACS)",
  'MT': 'Mobilités et transports (MT)',
  'TEC': "Transition énergétique et climat (TEC)",
  'AITAP': "Audits, inspections et transformation de l'action publique (AITAP)",
  'ESPD': "Études, synthèse, prospective et données (ESPD)",
  'AE': "Autorité environnementale (AE)",
  'SG': "Secrétariat général (SG)",
  'SG / CH': "Secrétariat général / CH",
};
const SECTION_ORDER = ['MRR','HACS','MT','TEC','AITAP','ESPD','AE','SG','SG / CH'];

const GROUP_COLORS = { 'I': 'var(--group-I)', 'II': 'var(--group-II)', 'III': 'var(--group-III)' };

function sectionSortKey(sec) {
  const idx = SECTION_ORDER.indexOf(sec);
  if (idx >= 0) return [0, idx, ''];
  if (sec && sec.startsWith('MIGT')) return [1, 0, sec];
  if (sec === 'À affecter') return [2, 0, sec];
  if (!sec) return [4, 0, ''];
  return [3, 0, sec];
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function parseDebut(debut) {
  const m = /^(\d{4})-(\d{2})-/.exec(String(debut || '').trim());
  if (!m) return { annee: '', mois: '' };
  return { annee: m[1], mois: MOIS_FR[m[2]] || '' };
}

function personCard(p) {
  const nomComplet = `${p.prenom} ${(p.prenom||'').toUpperCase() === p.prenom ? p.nom : String(p.nom||'').toUpperCase()}`;
  const photoHtml = p.photo
    ? `<img class="photo" src="${escapeHtml(p.photo)}" alt="${escapeHtml(p.nom)}" onerror="this.outerHTML='<div class=&quot;photo-placeholder&quot;>(photo indisponible)</div>'">`
    : `<div class="photo-placeholder">(pas de photo)</div>`;

  let badgeHtml = '';
  if (p.groupe) {
    const color = GROUP_COLORS[p.groupe] || 'var(--group-other)';
    const label = /^I{1,3}$/.test(p.groupe) ? `Groupe ${p.groupe}` : p.groupe;
    badgeHtml = `<div class="badge" style="background:${color}">${escapeHtml(label)}</div>`;
  }

  const { annee, mois } = parseDebut(p.debut);
  let promoHtml = '';
  if (annee || p.numeroPromo) {
    const dateArrivee = annee ? (mois ? `${mois} ${annee}` : annee) : '';
    const label = p.numeroPromo
      ? `Promo n°${p.numeroPromo}${dateArrivee ? ' — arrivée IGEDD : ' + dateArrivee : ''}`
      : `Promo (arrivée IGEDD) : ${dateArrivee}`;
    promoHtml = `<div class="promo">${escapeHtml(label)}</div>`;
  }

  const corpsGrade = [p.corps, p.grade].filter(Boolean).join(' — ');
  const corpsGradeHtml = corpsGrade ? `<div class="corpsgrade">${escapeHtml(corpsGrade)}</div>` : '';

  const comp = [p.c1, p.c2].filter(Boolean).join(' ; ');
  const compHtml = comp ? `<div class="comp">${escapeHtml(comp)}</div>` : '';

  const incompletHtml = (!p.section && !p.c1)
    ? `<div class="incomplet">Données incomplètes</div>`
    : '';

  const ageHtml = p.age ? `<span class="age"> · ${escapeHtml(p.age)} ans</span>` : '';

  return `<div class="card">
    ${photoHtml}
    <div class="name">${escapeHtml(nomComplet)}${ageHtml}</div>
    ${badgeHtml}
    ${promoHtml}
    ${corpsGradeHtml}
    ${compHtml}
    ${incompletHtml}
  </div>`;
}

function render(rows) {
  document.getElementById('status').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  const people = rows
    .filter(r => String(r.Statut || '').trim() === 'En poste')
    .map(r => ({
      prenom: String(r.Prenom || '').trim(),
      nom: String(r.Nom || '').trim(),
      groupe: String(r.Groupe || '').trim(),
      debut: r.Debut,
      numeroPromo: (r.Numero_promo && String(r.Numero_promo) !== '0') ? r.Numero_promo : '',
      c1: String(r.Competence_cle_1 || '').trim(),
      c2: String(r.Competence_cle_2 || '').trim(),
      section: String(r.Section || '').trim(),
      corps: String(r.Corps || '').trim(),
      grade: String(r.Grade || '').trim(),
      photo: String(r.Photo_url || '').trim(),
      age: (r.Age === null || r.Age === undefined || r.Age === '') ? '' : String(r.Age).trim(),
    }));

  const groups = {};
  for (const p of people) {
    (groups[p.section] = groups[p.section] || []).push(p);
  }
  const orderedSections = Object.keys(groups).sort((a, b) => {
    const ka = sectionSortKey(a), kb = sectionSortKey(b);
    return ka[0] - kb[0] || ka[1] - kb[1] || String(ka[2]).localeCompare(String(kb[2]));
  });

  function promoNum(p) {
    return p.numeroPromo ? (parseInt(p.numeroPromo, 10) || 0) : 0;
  }
  function promoLabel(n) {
    return n ? `Promo n°${n}` : 'Promo 0 - transfert de statut';
  }

  // Regroupe les membres d'une section en sous-parties par promo (promo 0 = transfert
  // de statut, affichée en premier par ordre chronologique), triées par numéro
  // croissant puis alphabétiquement par Nom à l'intérieur de chaque sous-partie.
  function promoGroups(members) {
    const byPromo = {};
    for (const p of members) {
      const n = promoNum(p);
      (byPromo[n] = byPromo[n] || []).push(p);
    }
    const ns = Object.keys(byPromo).map(Number).sort((a, b) => a - b);
    return ns.map(n => ({
      n, label: promoLabel(n),
      members: byPromo[n].slice().sort((a, b) => a.nom.localeCompare(b.nom)),
    }));
  }

  const sectionsEl = document.getElementById('sections');
  sectionsEl.innerHTML = orderedSections.map(sec => {
    const members = groups[sec];
    const label = SECTION_NAMES[sec] || sec || 'Section non renseignée';
    const groupsHtml = promoGroups(members).map(g => `
      <div class="promo-block">
        <h3>${escapeHtml(g.label)} (${g.members.length})</h3>
        <div class="grid">${g.members.map(personCard).join('')}</div>
      </div>`).join('');
    return `<section class="section-block">
      <h2>${escapeHtml(label)} (${members.length})</h2>
      ${groupsHtml}
    </section>`;
  }).join('');

  document.getElementById('meta').textContent =
    `${people.length} agents en poste, ${orderedSections.length} sections/implantations — généré en direct depuis Grist le ${new Date().toLocaleDateString('fr-FR')}`;
}

grist.ready({
  requiredAccess: 'read table',
  columns: [
    { name: 'Prenom', title: 'Prénom', type: 'Text' },
    { name: 'Nom', title: 'Nom', type: 'Text' },
    { name: 'Groupe', title: 'Groupe', type: 'Any', optional: true },
    { name: 'Statut', title: 'Statut', type: 'Any', optional: true },
    { name: 'Debut', title: 'Debut', type: 'Any', optional: true },
    { name: 'Age', title: 'Age', type: 'Any', optional: true },
    { name: 'Numero_promo', title: 'Numero_promo', type: 'Any', optional: true },
    { name: 'Competence_cle_1', title: 'Competence_cle_1', type: 'Text', optional: true },
    { name: 'Competence_cle_2', title: 'Competence_cle_2', type: 'Text', optional: true },
    { name: 'Section', title: 'Section', type: 'Any', optional: true },
    { name: 'Corps', title: 'Corps', type: 'Text', optional: true },
    { name: 'Grade', title: 'Grade', type: 'Text', optional: true },
    { name: 'Photo_url', title: 'Photo_url', type: 'Text', optional: true },
  ],
});

grist.onRecords((rows) => {
  const mapped = grist.mapColumnNames(rows) || rows;
  render(mapped);
});
</script>
</body>
</html>
