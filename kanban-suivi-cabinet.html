<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Kanban Suivi cabinet</title>
<script src="https://grist.numerique.gouv.fr/grist-plugin-api.js"></script>
<style>
  :root{
    --c1:#e3ecfb; --c1b:#3b6fd4;
    --c2:#e7e2fb; --c2b:#7c5cd6;
    --c3:#fff2d6; --c3b:#d99a1f;
    --c4:#fde7d3; --c4b:#e07a2b;
    --c5:#fde0e0; --c5b:#d24444;
    --c6:#e2f3e6; --c6b:#3a9a55;
    --gray:#8a8f98;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:12px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#f4f5f7;
    color:#26282c;
    font-size:13px;
  }
  #topbar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-bottom:12px;
  }
  #topbar h1{
    font-size:16px; margin:0; font-weight:700; color:#1c1e21; flex:0 0 auto;
  }
  .seg{
    display:flex; border:1px solid #d7d9dd; border-radius:8px; overflow:hidden;
  }
  .seg button{
    border:none; background:#fff; padding:6px 12px; cursor:pointer; font-size:12.5px; color:#444;
  }
  .seg button.active{ background:#26282c; color:#fff; }
  .seg button + button{ border-left:1px solid #d7d9dd; }
  select#pilotFilter{
    border:1px solid #d7d9dd; border-radius:8px; padding:6px 10px; font-size:12.5px; background:#fff;
  }
  #refreshBtn{
    border:1px solid #d7d9dd; background:#fff; border-radius:8px; padding:6px 12px; cursor:pointer; font-size:12.5px;
  }
  #status{ font-size:11.5px; color:var(--gray); margin-left:auto; }
  #board{
    display:flex; gap:10px; overflow-x:auto; align-items:flex-start;
    padding-bottom:8px;
  }
  .col{
    flex:1 1 0; min-width:190px; max-width:260px;
    background:#fff; border-radius:10px; border:1px solid #e4e5e8;
    display:flex; flex-direction:column; max-height:calc(100vh - 90px);
  }
  .col.dragover{ outline:2px dashed #999; outline-offset:-2px; }
  .col-head{
    padding:10px 10px 8px 10px; border-bottom:2px solid var(--bc);
    border-radius:10px 10px 0 0; background:var(--bg);
  }
  .col-head .title{ font-weight:700; font-size:12.5px; color:#20222a; }
  .col-head .count{ font-size:11px; color:#555; margin-top:2px; }
  .col-body{
    padding:8px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:8px;
    min-height:60px;
  }
  .card{
    background:#fff; border:1px solid #e2e3e6; border-radius:8px; padding:8px 9px;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
    cursor:grab; border-left:4px solid var(--tb);
  }
  .card:active{ cursor:grabbing; }
  .card.dragging{ opacity:.4; }
  .card .rowtop{ display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .tag{
    font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.3px;
    padding:1px 5px; border-radius:4px; color:#fff;
  }
  .tag.dossier{ background:var(--c1b); }
  .tag.courrier{ background:var(--c4b); }
  .lock{ font-size:11px; }
  .late{ color:var(--c5b); font-weight:700; }
  .card .titre{ font-size:12.5px; font-weight:600; line-height:1.3; margin-bottom:3px; }
  .card .sub{ font-size:11px; color:#666; margin-bottom:5px; }
  .card .meta{ display:flex; justify-content:space-between; align-items:flex-end; gap:6px; }
  .pilote{
    font-size:11px; font-weight:600; color:#26282c;
    background:#f0f1f3; border-radius:5px; padding:2px 6px;
  }
  .copilotes{ font-size:10px; color:var(--gray); margin-top:2px; }
  .echeance{ font-size:10.5px; color:var(--gray); white-space:nowrap; }
  .echeance.late{ color:var(--c5b); }
  #empty{ text-align:center; color:var(--gray); padding:40px; font-size:13px; }
  .card{ position:relative; }
  .card .editHint{
    position:absolute; top:6px; right:6px; font-size:10px; color:var(--gray);
    opacity:0; transition:opacity .1s;
  }
  .card:hover .editHint{ opacity:1; }
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,20,25,.4);
    display:flex; align-items:center; justify-content:center; z-index:1000;
  }
  .modal{
    background:#fff; border-radius:10px; padding:18px 20px; width:320px; max-width:90vw;
    box-shadow:0 12px 32px rgba(0,0,0,.25);
  }
  .modal h2{ font-size:14px; margin:0 0 4px 0; color:#1c1e21; }
  .modal .modalSub{ font-size:11px; color:var(--gray); margin-bottom:14px; }
  .modal .field{ margin-bottom:12px; }
  .modal .field label{
    display:block; font-size:10.5px; font-weight:700; color:#666; margin-bottom:4px;
    text-transform:uppercase; letter-spacing:.3px;
  }
  .modal select{
    width:100%; padding:6px 8px; border:1px solid #d7d9dd; border-radius:6px; font-size:13px; background:#fff;
  }
  .checkbox-list{
    max-height:150px; overflow-y:auto; border:1px solid #e4e5e8; border-radius:6px; padding:4px 8px;
  }
  .checkbox-list label{
    display:flex; align-items:center; gap:6px; font-size:12.5px; padding:4px 0; cursor:pointer;
  }
  .checkbox-list label:not(:last-child){ border-bottom:1px solid #f0f1f3; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }
  .modal-actions button{
    border:none; border-radius:6px; padding:7px 14px; font-size:12.5px; cursor:pointer;
  }
  #modalCancel{ background:#eee; color:#333; }
  #modalSave{ background:#26282c; color:#fff; }
</style>
</head>
<body>

<div id="topbar">
  <h1>Suivi cabinet — Kanban</h1>
  <div class="seg" id="typeSeg">
    <button data-type="all" class="active">Tous</button>
    <button data-type="Dossier">Dossiers</button>
    <button data-type="Courrier">Courriers</button>
  </div>
  <select id="pilotFilter"><option value="">Tous les pilotes</option></select>
  <button id="refreshBtn">⟳ Rafraîchir</button>
  <span id="status"></span>
</div>

<div id="board"></div>
<div id="empty" style="display:none">Chargement…</div>

<div id="modalOverlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div class="modalSub" id="modalSub"></div>
    <div class="field">
      <label>Pilote</label>
      <select id="piloteSelect"></select>
    </div>
    <div class="field">
      <label>Co-pilotes</label>
      <div id="copiloteList" class="checkbox-list"></div>
    </div>
    <div class="modal-actions">
      <button id="modalCancel">Annuler</button>
      <button id="modalSave">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const STAGES = [
  {key:"à examiner",          label:"À examiner",          bg:"var(--c1)", bc:"var(--c1b)"},
  {key:"pour attribution",    label:"Pour attribution",    bg:"var(--c2)", bc:"var(--c2b)"},
  {key:"en cours de traitement", label:"En cours de traitement", bg:"var(--c3)", bc:"var(--c3b)"},
  {key:"pour validation",     label:"Pour validation",     bg:"var(--c4)", bc:"var(--c4b)"},
  {key:"pour signature",      label:"Pour signature",      bg:"var(--c5)", bc:"var(--c5b)"},
  {key:"pour archivage",      label:"Pour archivage",      bg:"var(--c6)", bc:"var(--c6b)"},
];

let agentsById = {};
let agentsList = [];
let items = [];
let typeFilter = "all";
let pilotFilterId = "";
let currentItem = null;

function decodeList(v){
  if (Array.isArray(v) && v[0] === "L") return v.slice(1);
  if (Array.isArray(v)) return v;
  return v ? [v] : [];
}

function toRows(colData){
  const keys = Object.keys(colData).filter(k => k !== "id");
  const n = colData.id.length;
  const rows = [];
  for (let i=0;i<n;i++){
    const row = {id: colData.id[i]};
    keys.forEach(k => row[k] = colData[k][i]);
    rows.push(row);
  }
  return rows;
}

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function isLate(dateVal, statut){
  if (!dateVal || statut === "pour archivage") return false;
  const dateStr = typeof dateVal === "number"
    ? new Date(dateVal*1000).toISOString().slice(0,10)
    : String(dateVal).slice(0,10);
  return dateStr < todayStr();
}

function fmtDate(dateVal){
  if (!dateVal) return "";
  const d = typeof dateVal === "number" ? new Date(dateVal*1000) : new Date(dateVal);
  if (isNaN(d)) return "";
  return d.toLocaleDateString("fr-FR", {day:"2-digit", month:"2-digit"});
}

async function loadData(){
  document.getElementById("status").textContent = "Chargement…";
  const [dossiersRaw, courriersRaw, agentsRaw] = await Promise.all([
    grist.docApi.fetchTable("Dossiers"),
    grist.docApi.fetchTable("Courriers"),
    grist.docApi.fetchTable("Agents"),
  ]);

  agentsById = {};
  toRows(agentsRaw).forEach(a => { agentsById[a.id] = a.NomComplet || "?"; });
  agentsList = toRows(agentsRaw)
    .map(a => ({id: a.id, name: a.NomComplet || "?"}))
    .sort((a,b) => a.name.localeCompare(b.name));

  const dossiers = toRows(dossiersRaw).map(r => ({
    type: "Dossier",
    table: "Dossiers",
    id: r.id,
    titre: r.Objet || "(sans objet)",
    sous: r.Thematique || "",
    statut: r.Statut || "",
    pilote: r.Agent_referent || 0,
    copilotes: decodeList(r.Co_pilotes),
    echeance: r.Echeance,
    confidentiel: !!r.Confidentiel,
  }));

  const courriers = toRows(courriersRaw).map(r => ({
    type: "Courrier",
    table: "Courriers",
    id: r.id,
    titre: r.Objet || "(sans objet)",
    sous: r.Correspondant || "",
    statut: r.Statut || "",
    pilote: r.Agent_traitant || 0,
    copilotes: decodeList(r.Co_pilotes),
    echeance: r.Echeance_reponse,
    confidentiel: !!r.Confidentiel,
  }));

  items = dossiers.concat(courriers);

  const usedIds = new Set();
  items.forEach(it => { if (it.pilote) usedIds.add(it.pilote); it.copilotes.forEach(id => usedIds.add(id)); });
  const sel = document.getElementById("pilotFilter");
  const prev = sel.value;
  sel.innerHTML = '<option value="">Tous les pilotes</option>';
  Array.from(usedIds)
    .map(id => ({id, name: agentsById[id] || "?"}))
    .sort((a,b) => a.name.localeCompare(b.name))
    .forEach(a => {
      const opt = document.createElement("option");
      opt.value = a.id; opt.textContent = a.name;
      sel.appendChild(opt);
    });
  sel.value = prev;

  document.getElementById("status").textContent = "À jour · " + new Date().toLocaleTimeString("fr-FR");
  render();
}

function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  const empty = document.getElementById("empty");
  empty.style.display = "none";

  const filtered = items.filter(it => {
    if (typeFilter !== "all" && it.type !== typeFilter) return false;
    if (pilotFilterId && String(it.pilote) !== pilotFilterId && !it.copilotes.map(String).includes(pilotFilterId)) return false;
    return true;
  });

  STAGES.forEach(stage => {
    const col = document.createElement("div");
    col.className = "col";
    col.style.setProperty("--bg", stage.bg);
    col.style.setProperty("--bc", stage.bc);
    col.dataset.stage = stage.key;

    const head = document.createElement("div");
    head.className = "col-head";
    const colItems = filtered.filter(it => it.statut === stage.key);
    head.innerHTML = `<div class="title">${stage.label}</div><div class="count">${colItems.length} élément(s)</div>`;
    col.appendChild(head);

    const body = document.createElement("div");
    body.className = "col-body";

    colItems.forEach(it => {
      const card = document.createElement("div");
      card.className = "card";
      card.draggable = true;
      card.style.setProperty("--tb", it.type === "Dossier" ? "var(--c1b)" : "var(--c4b)");
      card.dataset.table = it.table;
      card.dataset.id = it.id;

      const late = isLate(it.echeance, it.statut);
      const pilonom = it.pilote ? (agentsById[it.pilote] || "?") : "—";
      const copilNames = it.copilotes.map(id => agentsById[id] || "?").filter(Boolean);

      card.title = "Cliquer pour modifier le pilote / les co-pilotes";

      card.innerHTML = `
        <span class="editHint">✎</span>
        <div class="rowtop">
          <span class="tag ${it.type.toLowerCase()}">${it.type}</span>
          ${it.confidentiel ? '<span class="lock" title="Confidentiel">🔒</span>' : ""}
        </div>
        <div class="titre">${escapeHtml(it.titre)}</div>
        <div class="sub">${escapeHtml(it.sous)}</div>
        <div class="meta">
          <div>
            <div class="pilote">${escapeHtml(pilonom)}</div>
            ${copilNames.length ? `<div class="copilotes">+ ${copilNames.map(escapeHtml).join(", ")}</div>` : ""}
          </div>
          <div class="echeance ${late ? "late" : ""}">${it.echeance ? fmtDate(it.echeance) : ""}${late ? " ⚠" : ""}</div>
        </div>
      `;

      card.addEventListener("dragstart", e => {
        card.classList.add("dragging");
        e.dataTransfer.setData("text/plain", JSON.stringify({table: it.table, id: it.id}));
      });
      card.addEventListener("dragend", () => card.classList.remove("dragging"));
      card.addEventListener("click", () => openAssignModal(it));

      body.appendChild(card);
    });

    col.appendChild(body);

    col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("dragover"); });
    col.addEventListener("dragleave", () => col.classList.remove("dragover"));
    col.addEventListener("drop", async e => {
      e.preventDefault();
      col.classList.remove("dragover");
      const data = JSON.parse(e.dataTransfer.getData("text/plain"));
      const newStage = col.dataset.stage;
      try {
        document.getElementById("status").textContent = "Mise à jour…";
        await grist.docApi.applyUserActions([
          ["UpdateRecord", data.table, data.id, {Statut: newStage}]
        ]);
        await loadData();
      } catch (err) {
        document.getElementById("status").textContent = "Erreur : " + err.message;
      }
    });

    board.appendChild(col);
  });

  if (filtered.length === 0){
    empty.style.display = "block";
    empty.textContent = "Aucun dossier ni courrier ne correspond au filtre.";
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

document.getElementById("typeSeg").addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  typeFilter = btn.dataset.type;
  document.querySelectorAll("#typeSeg button").forEach(b => b.classList.toggle("active", b === btn));
  render();
});
document.getElementById("pilotFilter").addEventListener("change", e => {
  pilotFilterId = e.target.value;
  render();
});
document.getElementById("refreshBtn").addEventListener("click", loadData);

function openAssignModal(item){
  currentItem = item;
  document.getElementById("modalTitle").textContent = escapeHtml(item.titre);
  document.getElementById("modalSub").textContent = item.type + (item.sous ? " · " + item.sous : "");

  const piloteSel = document.getElementById("piloteSelect");
  piloteSel.innerHTML = '<option value="">— Aucun —</option>' +
    agentsList.map(a => `<option value="${a.id}">${escapeHtml(a.name)}</option>`).join("");
  piloteSel.value = item.pilote ? String(item.pilote) : "";

  const copiloteList = document.getElementById("copiloteList");
  copiloteList.innerHTML = agentsList.map(a => `
    <label><input type="checkbox" value="${a.id}" ${item.copilotes.includes(a.id) ? "checked" : ""}> ${escapeHtml(a.name)}</label>
  `).join("");

  document.getElementById("modalOverlay").style.display = "flex";
}

function closeAssignModal(){
  document.getElementById("modalOverlay").style.display = "none";
  currentItem = null;
}

document.getElementById("modalCancel").addEventListener("click", closeAssignModal);
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target.id === "modalOverlay") closeAssignModal();
});

document.getElementById("modalSave").addEventListener("click", async () => {
  if (!currentItem) return;
  const piloteVal = document.getElementById("piloteSelect").value;
  const piloteId = piloteVal ? Number(piloteVal) : 0;
  const copiloteIds = Array.from(document.querySelectorAll("#copiloteList input:checked")).map(el => Number(el.value));
  const piloteField = currentItem.type === "Dossier" ? "Agent_referent" : "Agent_traitant";
  const table = currentItem.table;
  const id = currentItem.id;
  const payload = {};
  payload[piloteField] = piloteId;
  payload["Co_pilotes"] = ["L"].concat(copiloteIds);

  try {
    document.getElementById("status").textContent = "Mise à jour…";
    await grist.docApi.applyUserActions([
      ["UpdateRecord", table, id, payload]
    ]);
    closeAssignModal();
    await loadData();
  } catch (err) {
    document.getElementById("status").textContent = "Erreur : " + err.message;
  }
});

grist.ready({requiredAccess: "full"});
grist.onOptions(() => {});
loadData();
setInterval(loadData, 20000);
</script>
</body>
</html>
