async function initBackend(){
  if(firebaseReady()){
    const appMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const dbMod  = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const app = appMod.initializeApp(FIREBASE_CONFIG);
    const database = dbMod.getDatabase(app);
    DB = {
      mode:"firebase",
      watch:(p,cb)=>{ const r=dbMod.ref(database,p); return dbMod.onValue(r,s=>cb(s.val()),err=>{ console.error("Firebase read denied on "+p,err); const el=document.getElementById("stx"); if(el){ el.textContent="Firebase : "+err.message+" (vérifier les règles pour /rooms)"; el.className="status err"; } }); },
      set:(p,v)=>dbMod.set(dbMod.ref(database,p),v),
      push:(p,v)=>{ const r=dbMod.push(dbMod.ref(database,p),v); return r.key; },
      update:(p,v)=>dbMod.update(dbMod.ref(database,p),v),
      remove:(p)=>dbMod.remove(dbMod.ref(database,p))
    };
  } else {
    DB = makeLocalAdapter();
  }
}
function makeLocalAdapter(){
  const KEY="cap2028_local";
  const watchers=[];
  const read =()=>{ try{return JSON.parse(localStorage.getItem(KEY)||"{}")}catch(e){return {}} };
  const write=(t)=>{ localStorage.setItem(KEY,JSON.stringify(t)); notify(); };
  const parts=p=>p.split("/").filter(Boolean);
  const getAt=(t,p)=>{ let c=t; for(const k of parts(p)){ if(c==null)return null; c=c[k]; } return c==null?null:c; };
  const setAt=(t,p,v)=>{ const ks=parts(p); let c=t; for(let i=0;i<ks.length-1;i++){ if(typeof c[ks[i]]!=="object"||c[ks[i]]==null)c[ks[i]]={}; c=c[ks[i]]; } if(v===undefined||v===null)delete c[ks[ks.length-1]]; else c[ks[ks.length-1]]=v; };
  function notify(){ const t=read(); watchers.forEach(w=>{ try{ w.cb(getAt(t,w.path)); }catch(e){} }); }
  window.addEventListener("storage",e=>{ if(e.key===KEY)notify(); });
  return {
    mode:"local",
    watch:(p,cb)=>{ const w={path:p,cb}; watchers.push(w); cb(getAt(read(),p)); return ()=>{ const i=watchers.indexOf(w); if(i>=0)watchers.splice(i,1); }; },
    set:(p,v)=>{ const t=read(); setAt(t,p,v); write(t); },
    push:(p,v)=>{ const id="k"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); const t=read(); setAt(t,p+"/"+id,v); write(t); return id; },
    update:(p,v)=>{ const t=read(); for(const k in v)setAt(t,p+"/"+k,v[k]); write(t); },
    remove:(p)=>{ const t=read(); setAt(t,p,undefined); write(t); }
  };
}

function renderLibCodevList(){
  if(!libCodev.length) return '<p class="hint" style="font-size:12px">Aucun ajout pour l\'instant.</p>';
  return libCodev.map(s=>{

function bindLib(selId,btnId,items,onUse){
  const sel=document.getElementById(selId); if(!sel)return;
  const btn=document.getElementById(btnId);
  sel.addEventListener("change",()=>{
    const i=sel.value; if(btn)btn.disabled=(i==="");
    const ax=document.getElementById(selId+"Ax");
    if(ax)ax.innerHTML=(i===""||!items[i].axes)?"":("Axes : "+axChips(items[i].axes)+" "+items[i].axes.map(a=>AXES[a]).join(" · "));
  });
  if(btn)btn.addEventListener("click",()=>{ const i=sel.value; if(i==="")return; onUse(items[i],parseInt(i,10)); });
}

/* Modale générique de saisie de mot de passe (animateur) */
function askPassword(titre,texte,expected,onOk){
  const ovl=document.createElement("div"); ovl.className="ovl";
  ovl.innerHTML='<div class="modal"><div class="mh">🧭 '+esc(titre)+'</div>'
   +'<div class="mb"><p>'+esc(texte)+'</p>'
   +'<input id="mPw" type="password" placeholder="Mot de passe animateur" autocomplete="off">'
   +'<p class="status err" id="mErr" style="text-align:center"></p>'
   +'<div class="mf"><button class="btn sec" id="mCancel">Annuler</button><button class="btn prim" id="mOk">Valider</button></div>'
   +'</div></div>';
  document.body.appendChild(ovl);
  const close=()=>ovl.remove();
  const tryOk=()=>{
    const v=document.getElementById("mPw").value;
    if(norm(v)===norm(expected)){ close(); onOk(); }
    else{
      document.getElementById("mErr").textContent="Mot de passe incorrect.";
      const m=ovl.querySelector(".modal"); m.classList.remove("shake"); void m.offsetWidth; m.classList.add("shake");
      const p=document.getElementById("mPw"); p.value=""; p.focus();
    }
  };
  document.getElementById("mOk").addEventListener("click",tryOk);
  document.getElementById("mCancel").addEventListener("click",close);
  ovl.addEventListener("click",e=>{ if(e.target===ovl)close(); });
  document.getElementById("mPw").addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();tryOk();} if(e.key==="Escape")close(); });
  setTimeout(()=>document.getElementById("mPw").focus(),60);
}

function joinRoom(){
  room = room || {};
  renderApp();
  Promise.resolve(DB.set(basePath()+"/participants/"+uid, {pseudo:pseudo, ts:Date.now()}))
    .catch(e=>{ console.error("Firebase write denied",e); const el=document.getElementById("stx"); if(el){ el.textContent="Firebase : "+e.message+" (règles à autoriser sur /rooms)"; el.className="status err"; } });
  if(unwatch) unwatch();
  unwatch = DB.watch(basePath(), (val)=>{ room = val||{}; renderApp(); });
  watchLibrary();
}
/* Bibliothèque enrichie : situations ajoutées par les animateurs, partagées
   entre tous les ateliers (chemin /library/codev/situations). */
function watchLibrary(){
  if(unwatchLib) return;
  unwatchLib = DB.watch("library/codev/situations", val=>{
    libCodev = val ? Object.keys(val).map(k=>Object.assign({id:k},val[k])).sort((a,b)=>(a.ts||0)-(b.ts||0)) : [];
    if(anim) renderApp();
  });
}
function codevSituations(){
  return CONTENT.codev.situations.concat(libCodev.map(x=>Object.assign({},x,{_custom:true})));
}
function renderTop(){
  topRight.innerHTML =
    '<span class="tag mode">'+(DB.mode==="firebase"?"Firebase":"Local")+'</span>'
   +'<span class="tag room">Salle '+esc(roomId)+'</span>'
   +'<span class="tag me">⚓ '+esc(pseudo)+'</span>'
   +'<button class="tbtn'+(anim?" anim-on":"")+'" id="animToggle">'+(isAnimateur?"🧭 Animation":"🔒 Animation")+'</button>';
  document.getElementById("animToggle").addEventListener("click",openAnim);
}
/* Ouvre le panneau d'animation, sous réserve du mot de passe animateur. */
function openAnim(){
  if(isAnimateur || !ACCESS.animateur){
    isAnimateur=true; anim=!anim; renderApp(); return;
  }
  askPassword("Espace animateur","Le pilotage de l'atelier est réservé à l'animateur. Saisissez le mot de passe animateur.",ACCESS.animateur,()=>{
    isAnimateur=true; sessionStorage.setItem("cap2028_anim","1"); anim=true; renderApp();
  });
}

/* Conserve les saisies en cours lors des re-rendus déclenchés par le temps
   réel : sans cela, chaque contribution d'un autre participant effacerait
   le texte que l'on est en train de taper. */
function snapshotFields(){
  const snap={vals:{},focus:null,selS:0,selE:0,open:{}};
  root.querySelectorAll("input[id],textarea[id],select[id]").forEach(el=>{ snap.vals[el.id]=el.value; });
  root.querySelectorAll("details[id]").forEach(el=>{ snap.open[el.id]=el.open; });
  const ae=document.activeElement;
  if(ae&&ae.id&&(ae.id in snap.vals)){ snap.focus=ae.id; try{ snap.selS=ae.selectionStart; snap.selE=ae.selectionEnd; }catch(e){} }
  return snap;
}
function restoreFields(snap){
  for(const id in snap.vals){
    const el=document.getElementById(id); if(!el)continue;
    if(el.tagName==="SELECT"){
      if(snap.vals[id]!==""&&el.value!==snap.vals[id]&&Array.prototype.some.call(el.options,o=>o.value===snap.vals[id])){
        el.value=snap.vals[id]; el.dispatchEvent(new Event("change"));
      }
    }
    else if(id===snap.focus){ el.value=snap.vals[id]; el.focus(); try{ el.setSelectionRange(snap.selS,snap.selE); }catch(e){} }
    else if(el.value===""&&snap.vals[id]!=="") el.value=snap.vals[id];
  }
  for(const id in snap.open){ const el=document.getElementById(id); if(el)el.open=snap.open[id]; }
}

function renderApp(){
  renderTop();
  const snap=snapshotFields();
  const st = (room&&room.state)||{};
  let h = animPanel(st);
  const active = st.active;
  if(!active){
    h += '<div class="panel"><div class="waiting"><span class="lh">🗼</span>'
       + '<h2><span class="pulse"></span>En attente de lancement</h2>'
       + '<p class="hint" style="max-width:520px;margin:8px auto 0">L\'animateur choisit une méthode dans le panneau « Animation » en haut à droite. L\'écran de chacun suivra automatiquement.</p>'
       + '</div><h3>Présents dans la salle</h3><div class="crew" id="crew"></div></div>';
  } else if(active==="designfiction") h += viewDesignFiction(st);
  else if(active==="codev")          h += viewCodev(st);
  else if(active==="sixchapeaux")    h += viewHats(st);
  else if(active==="debatmouvant")   h += viewDebate(st);
  else if(active==="worldcafe")      h += viewCafe(st);
  else if(active==="cartoarg")       h += viewCarto(st);
  h += '<p class="status" id="stx"></p>';
  root.innerHTML = h;
  bindAnim(st); bindActive(active,st);
  restoreFields(snap);
  fillCrew();
}

function bindAnim(st){
  if(!anim) return;
  root.querySelectorAll("[data-m]").forEach(b=>b.addEventListener("click",()=>setState({active:b.dataset.m})));
  const dfs=document.getElementById("dfSet"); if(dfs)dfs.addEventListener("click",()=>setState({dfPrompt:document.getElementById("dfPrompt").value.trim()}));
  const cvc=document.getElementById("cvClientSet"); if(cvc)cvc.addEventListener("click",()=>setState({cvClient:document.getElementById("cvClient").value.trim()}));
  root.querySelectorAll("[data-cvph]").forEach(b=>b.addEventListener("click",()=>setState({cvPhase:parseInt(b.dataset.cvph,10)})));
  root.querySelectorAll("[data-hat]").forEach(b=>b.addEventListener("click",()=>setState({hat:b.dataset.hat})));
  const dbs=document.getElementById("dbSet"); if(dbs)dbs.addEventListener("click",()=>setState({dbAff:document.getElementById("dbAff").value.trim()}));
  const dbn=document.getElementById("dbNew"); if(dbn)dbn.addEventListener("click",()=>{ DB.remove(basePath()+"/data/debatmouvant"); setState({dbTour:(st.dbTour||0)+1}); });
  const cfs=document.getElementById("cfSet"); if(cfs)cfs.addEventListener("click",()=>setState({cafeTables:[0,1,2].map(i=>document.getElementById("cf"+i).value.trim())}));
  const cas=document.getElementById("caSet"); if(cas)cas.addEventListener("click",()=>setState({caThesis:document.getElementById("caTh").value.trim()}));
  const ex=document.getElementById("aExport"); if(ex)ex.addEventListener("click",doExport);
  const rs=document.getElementById("aReset"); if(rs)rs.addEventListener("click",()=>{ if(confirm("Effacer les contributions de la méthode active ?")){ DB.remove(basePath()+"/data/"+st.active); status("Méthode réinitialisée",true); } });
  /* bibliothèques de contenu */
  bindLib("dfLib","dfLibUse",CONTENT.designFiction.prompts,it=>{ setState({dfPrompt:it.texte}); status("Question prospective définie",true); });
  bindLib("cvLib","cvLibUse",codevSituations(),it=>{
    DB.set(basePath()+"/data/codev/expose",it.texte);
    if(!st.cvClient)setState({cvClient:"Cas fictif"});
    status("Cas proposé comme exposé",true);
  });
  /* Enrichissement de la bibliothèque codev (animateur seulement) */
  const cvAdd=document.getElementById("cvLibAddBtn");
  if(cvAdd)cvAdd.addEventListener("click",()=>{
    const ta=document.getElementById("cvLibAdd");
    const t=ta.value.trim();
    if(!t){ status("Énoncé requis",false); ta.focus(); return; }
    const axRaw=document.getElementById("cvLibAxes").value.trim();
    const axes=axRaw.split(/[,;\s]+/).map(s=>s.toUpperCase()).filter(s=>/^[A-H]$/.test(s));
    Promise.resolve(DB.push("library/codev/situations",{texte:t,axes:axes,by:pseudo,ts:Date.now()}))
      .then(()=>{ status("Situation ajoutée à la bibliothèque",true); })
      .catch(e=>{ status("Échec : "+e.message+" (autoriser /library dans les règles Firebase)",false); });
    ta.value=""; document.getElementById("cvLibAxes").value="";
    const det=document.getElementById("cvLibEnrich"); if(det)det.open=true;
  });
  root.querySelectorAll("[data-libdel]").forEach(b=>b.addEventListener("click",()=>{
    if(!confirm("Retirer cette situation de la bibliothèque partagée ?"))return;
    DB.remove("library/codev/situations/"+b.dataset.libdel);
  }));
  bindLib("hatLib","hatLibUse",CONTENT.sixChapeaux.sujets,(it,i)=>{ setState({hatSujet:i}); status("Sujet défini : "+it.titre,true); });
  bindLib("dbLib","dbLibUse",CONTENT.debatMouvant.affirmations,it=>{ setState({dbAff:it.texte}); status("Affirmation définie",true); });
  bindLib("cfLib","cfLibUse",CONTENT.worldCafe.jeux,it=>{ setState({cafeTables:it.tables}); status("Thèmes des tables définis",true); });
  bindLib("caLib","caLibUse",CONTENT.cartoArguments.theses,it=>{ setState({caThesis:it.texte}); status("Thèse définie",true); });
  const caL=document.getElementById("caLib"), caS=document.getElementById("caSeed");
  if(caL&&caS){
    caL.addEventListener("change",()=>{ caS.disabled=(caL.value===""); });
    caS.addEventListener("click",()=>{
      const i=caL.value; if(i==="")return;
      const th=CONTENT.cartoArguments.theses[i];
      if(!confirm("Définir cette thèse et déposer "+th.amorces.length+" amorces dans l'arbre ?"))return;
      setState({caThesis:th.texte});
      th.amorces.forEach((a,j)=>DB.push(basePath()+"/data/cartoarg",{type:a.type,parent:a.parent||"root",text:a.texte,by:"amorce",ts:Date.now()+j}));
      status("Thèse définie et amorces déposées",true);
    });
  }
}

function viewCodev(st){
  const phase = st.cvPhase||0;

  const isClient = client && pseudo.toLowerCase()===client;
  const d = (room&&room.data&&room.data.codev)||{};

  const suggestions = listOf(d.suggestions);
  let h='<div class="panel"><h2>Codéveloppement</h2>'
   +'<div class="help">Une personne expose une situation réelle de sortie d\'emploi fonctionnel. Le groupe questionne, puis propose. '+(st.cvClient?('Exposant : <b>'+esc(st.cvClient)+'</b>.'):'En attente de la désignation de l\'exposant par l\'animateur.')+'</div>'
   +'<p class="hint" style="font-weight:700;color:var(--teal)">Étape '+(phase+1)+' / 5 : '+esc(CODEV_PHASES[phase])+'</p>';
  /* exposé */
  h+='<h3>1. La situation exposée'+help("L\'exposant décrit en quelques phrases une situation réelle qu\'il vit ou anticipe (sortie d\'emploi fonctionnel). Factuel, anonyme si nécessaire, sans solution déjà arrêtée.")+'</h3>';
  if(isClient && phase<=1){
    h+='<div class="row" style="align-items:flex-start"><textarea id="cvExpose" maxlength="700" placeholder="Décrivez la situation">'+esc(d.expose||"")+'</textarea></div><button class="btn prim sm" id="cvExposeSave">Enregistrer mon exposé</button>';
  } else {
    h+='<div class="item">'+(d.expose?esc(d.expose):'<span class="hint">En attente de l\'exposé.</span>')+'</div>';
  }
  /* questions */
  h+='<h3>2. Questions de clarification'+help("Posez des questions ouvertes pour mieux comprendre la situation. À ce stade, on cherche à clarifier, pas à conseiller.")+'</h3>';
  if(phase===1){ h+='<div class="row"><input id="cvQ" type="text" maxlength="200" placeholder="Votre question" data-go="cvQAdd"><button class="btn prim sm" id="cvQAdd">Poser</button></div>'; }

  /* contrat */
  h+='<h3>3. La demande (contrat)'+help("L\'exposant formule précisément ce sur quoi il attend l\'avis du groupe. Une question, un dilemme, un point d\'arbitrage : pas tout en même temps.")+'</h3>';
  if(isClient && phase>=2){ h+='<div class="row" style="align-items:flex-start"><textarea id="cvContrat" maxlength="400" placeholder="Sur quoi voulez-vous l\'avis du groupe ?">'+esc(d.contrat||"")+'</textarea></div><button class="btn prim sm" id="cvContratSave">Enregistrer la demande</button>'; }
  else { h+='<div class="item">'+(d.contrat?esc(d.contrat):'<span class="hint">En attente de la demande.</span>')+'</div>'; }
  /* suggestions */
  h+='<h3>4. Suggestions du groupe'+help("Proposez sans imposer : « à votre place, je... », « avez-vous envisagé... ». Restez orienté vers la demande formulée à l\'étape 3.")+'</h3>';
  if(phase===3){ h+='<div class="row"><input id="cvS" type="text" maxlength="220" placeholder="Votre suggestion" data-go="cvSAdd"><button class="btn prim sm" id="cvSAdd">Proposer</button></div>'; }
  h+='<div id="cvSList" style="margin-top:8px">'+(suggestions.length?suggestions.map(s=>'<div class="item">'+esc(s.text)+'<div class="who">'+esc(s.by)+'</div></div>').join(""):'<p class="hint">Aucune suggestion.</p>')+'</div>';
  /* plan */
  h+='<h3>5. Plan d\'action'+help("L\'exposant synthétise ce qu\'il retient et indique deux ou trois actions concrètes qu\'il compte mettre en oeuvre. Bref, daté quand c\'est possible.")+'</h3>';
  if(isClient && phase>=4){ h+='<div class="row" style="align-items:flex-start"><textarea id="cvPlan" maxlength="500" placeholder="Ce que je retiens et compte mettre en oeuvre">'+esc(d.plan||"")+'</textarea></div><button class="btn prim sm" id="cvPlanSave">Enregistrer le plan</button>'; }
  else { h+='<div class="item">'+(d.plan?esc(d.plan):'<span class="hint">En attente de la synthèse.</span>')+'</div>'; }

      DB.push(basePath()+"/data/designfiction",{sig,hyp,rec,by:pseudo,ts:Date.now()}); status("Scénario ajouté",true);
    });
    root.querySelectorAll("[data-sig]").forEach(c=>c.addEventListener("click",()=>{
      const el=document.getElementById("dfSig"); if(el){ el.value=c.dataset.sig; el.focus(); }
    }));
  }
  if(active==="codev"){
    const save=(field,id)=>{ const el=document.getElementById(id); if(el)el.parentElement; };
    const ex=document.getElementById("cvExposeSave"); if(ex)ex.addEventListener("click",()=>{ DB.set(basePath()+"/data/codev/expose",document.getElementById("cvExpose").value.trim()); status("Exposé enregistré",true); });
    const ct=document.getElementById("cvContratSave"); if(ct)ct.addEventListener("click",()=>{ DB.set(basePath()+"/data/codev/contrat",document.getElementById("cvContrat").value.trim()); status("Demande enregistrée",true); });
    const pl=document.getElementById("cvPlanSave"); if(pl)pl.addEventListener("click",()=>{ DB.set(basePath()+"/data/codev/plan",document.getElementById("cvPlan").value.trim()); status("Plan enregistré",true); });
    const qa=document.getElementById("cvQAdd"); if(qa)qa.addEventListener("click",()=>{ const el=document.getElementById("cvQ"); const t=el.value.trim(); if(!t)return; el.value=""; DB.push(basePath()+"/data/codev/questions",{text:t,by:pseudo,ts:Date.now()}); });
    const sa=document.getElementById("cvSAdd"); if(sa)sa.addEventListener("click",()=>{ const el=document.getElementById("cvS"); const t=el.value.trim(); if(!t)return; el.value=""; DB.push(basePath()+"/data/codev/suggestions",{text:t,by:pseudo,ts:Date.now()}); });
  }
  if(active==="sixchapeaux"){
    const b=document.getElementById("hatAdd");
    if(b)b.addEventListener("click",()=>{ const el=document.getElementById("hatTxt"); const t=el.value.trim(); if(!t)return; el.value=""; DB.push(basePath()+"/data/sixchapeaux",{hat:(st.hat||HATS[0].id),text:t,by:pseudo,ts:Date.now()}); });
  }
  if(active==="debatmouvant"){
    root.querySelectorAll("[data-st]").forEach(b=>b.addEventListener("click",()=>{ DB.set(basePath()+"/data/debatmouvant/positions/"+uid,{stance:b.dataset.st,by:pseudo}); }));
    const a=document.getElementById("dbArgAdd");
    if(a)a.addEventListener("click",()=>{ const el=document.getElementById("dbArg"); const t=el.value.trim(); const pos=(room&&room.data&&room.data.debatmouvant&&room.data.debatmouvant.positions&&room.data.debatmouvant.positions[uid])?room.data.debatmouvant.positions[uid].stance:"nuance"; if(!t)return; el.value=""; DB.push(basePath()+"/data/debatmouvant/args",{stance:pos,text:t,by:pseudo,ts:Date.now()}); });
  }
  if(active==="worldcafe"){
    const b=document.getElementById("cfAdd");
    if(b)b.addEventListener("click",()=>{ const i=document.getElementById("cfTable").value; const t=document.getElementById("cfTxt").value.trim(); if(!t)return; DB.push(basePath()+"/data/worldcafe/"+i,{text:t,by:pseudo,ts:Date.now()}); document.getElementById("cfTxt").value=""; });
  }
  if(active==="cartoarg"){
    const b=document.getElementById("caAdd");
    if(b)b.addEventListener("click",()=>{ const ty=document.getElementById("caType").value; const pa=document.getElementById("caParent").value; const t=document.getElementById("caTxt").value.trim(); if(!t)return; DB.push(basePath()+"/data/cartoarg",{type:ty,parent:pa,text:t,by:pseudo,ts:Date.now()}); document.getElementById("caTxt").value=""; });
  }
}

/* ============================================================
   10. UTILITAIRES DONNEES + EXPORT
   ============================================================ */
function listOf(obj){ if(!obj||typeof obj!=="object")return []; return Object.keys(obj).map(k=>Object.assign({id:k},obj[k])).filter(x=>x&&typeof x==="object"&&("text" in x||"sig" in x)).sort((a,b)=>(a.ts||0)-(b.ts||0)); }
function dataList(method){ const d=(room&&room.data&&room.data[method])||{}; return Object.keys(d).map(k=>Object.assign({id:k},d[k])).filter(x=>x&&typeof x==="object"&&(x.ts!==undefined)).sort((a,b)=>(a.ts||0)-(b.ts||0)); }

function doExport(){
  const out={ mission:"016714-01", outil:"Cap 2028", salle:roomId, date:new Date().toISOString(),
    participants:Object.values((room&&room.participants)||{}).map(p=>p.pseudo),
    etat:(room&&room.state)||{}, donnees:(room&&room.data)||{} };
  const txt=JSON.stringify(out,null,1);
  const box=document.getElementById("exportBox"); if(box){ box.hidden=false; box.value=txt; box.select(); }
  try{ const blob=new Blob([txt],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="cap2028_"+roomId+"_"+Date.now()+".json"; a.click(); }catch(e){}
  status("Export généré et téléchargé",true);
}
